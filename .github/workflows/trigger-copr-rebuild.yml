name: Trigger COPR Rebuild

on:
  push:
    branches:
      - main
    paths:
      - "packages/*/*.spec"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger COPR webhook
        env:
          COPR_WEBHOOK_URL: ${{ secrets.COPR_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          webhook_url="$(printf '%s' "${COPR_WEBHOOK_URL:-}" | tr -d '\r\n' | xargs)"

          if [[ -z "${webhook_url}" ]]; then
            echo "COPR_WEBHOOK_URL secret is required" >&2
            exit 1
          fi

          if [[ ! "${webhook_url}" =~ ^https://copr\.fedorainfracloud\.org/webhooks/github/[0-9]+/[^/]+/?$ ]]; then
            echo "COPR_WEBHOOK_URL is not a valid COPR GitHub webhook URL" >&2
            exit 1
          fi

          curl -fsS -X POST "${webhook_url}"
