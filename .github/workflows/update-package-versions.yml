name: Update Package Versions

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to update, or "all"
        required: true
        default: all
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: repo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: repo

      - name: Install tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          python3 -m pip install --user copr
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Verify checkout
        run: |
          set -euo pipefail
          pwd
          ls -la
          git rev-parse --show-toplevel
          git status --short

      - name: Update package versions
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          set -euo pipefail
          chmod +x scripts/bump-version.sh scripts/update-from-github-release.sh

          if [[ -n "${INPUT_PACKAGE:-}" && "${INPUT_PACKAGE}" != "all" ]]; then
            scripts/update-from-github-release.sh "${INPUT_PACKAGE}"
          else
            while IFS= read -r meta; do
              package="$(basename "$(dirname "${meta}")")"
              scripts/update-from-github-release.sh "${package}"
            done < <(find packages -mindepth 2 -maxdepth 2 -name upstream.env | sort)
          fi

      - name: Commit and push if changed
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No version changes detected"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          packages="$(
            git diff --name-only \
              | grep -E '^packages/[^/]+/[^/]+\.spec$' || true \
              | awk -F/ '{print $2}' \
              | sort -u \
              | paste -sd ' ' -
          )"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/*.spec
          git commit -m "Update package versions"
          git push

          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "packages=${packages}" >> "${GITHUB_OUTPUT}"

      - name: Configure copr-cli
        if: steps.commit.outputs.changed == 'true'
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          set -euo pipefail

          if [[ -z "${COPR_CONFIG:-}" ]]; then
            echo "COPR_CONFIG secret is required to submit COPR builds" >&2
            exit 1
          fi

          mkdir -p ~/.config
          printf '%s\n' "${COPR_CONFIG}" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Trigger COPR builds
        if: steps.commit.outputs.changed == 'true'
        env:
          PACKAGES: ${{ steps.commit.outputs.packages }}
        run: |
          set -euo pipefail

          if [[ -z "${PACKAGES:-}" ]]; then
            echo "No package changes detected for COPR submission"
            exit 0
          fi

          for package in ${PACKAGES}; do
            copr build-package bonvaffel/cli-tools \
              --name "${package}" \
              --enable-net on \
              --background \
              --nowait
          done
