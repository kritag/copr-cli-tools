name: Build COPR Packages

on:
  push:
    branches:
      - main
    paths:
      - "packages/*/*.spec"
  workflow_dispatch:
    inputs:
      package:
        description: Package to build, or "changed"
        required: true
        default: changed

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: repo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: repo

      - name: Install copr-cli
        run: |
          set -euo pipefail
          docker --version

      - name: Verify checkout
        run: |
          set -euo pipefail
          pwd
          ls -la
          git rev-parse --show-toplevel
          git status --short

      - name: Configure copr-cli
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          set -euo pipefail

          if [[ -z "${COPR_CONFIG:-}" ]]; then
            echo "COPR_CONFIG secret is required" >&2
            exit 1
          fi

          mkdir -p ~/.config
          printf '%s\n' "${COPR_CONFIG}" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Resolve packages to build
        id: packages
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_PACKAGE:-}" && "${INPUT_PACKAGE}" != "changed" ]]; then
            packages="${INPUT_PACKAGE}"
          else
            before="${BEFORE_SHA:-}"
            after="${AFTER_SHA:-$(git rev-parse HEAD)}"

            if [[ -n "${before}" && "${before}" != "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(
                git diff --name-only "${before}" "${after}" \
                  | grep -E '^packages/[^/]+/[^/]+\.spec$' || true
              )"
            else
              changed_files="$(
                git show --name-only --pretty='' "${after}" \
                  | grep -E '^packages/[^/]+/[^/]+\.spec$' || true
              )"
            fi

            packages="$(
              printf '%s\n' "${changed_files}" \
                | awk -F/ 'NF >= 3 {print $2}' \
                | sort -u \
                | paste -sd ' ' -
            )"
          fi

          echo "packages=${packages}" >> "${GITHUB_OUTPUT}"

      - name: Trigger COPR builds
        env:
          PACKAGES: ${{ steps.packages.outputs.packages }}
        run: |
          set -euo pipefail

          if [[ -z "${PACKAGES:-}" ]]; then
            echo "No package changes detected"
            exit 0
          fi

          cp ~/.config/copr ../copr.conf

          for package in ${PACKAGES}; do
            docker run --rm \
              -v "${PWD}:/work:ro" \
              -v "${PWD}/../copr.conf:/root/.config/copr:ro" \
              -w /work \
              registry.fedoraproject.org/fedora:44 \
              bash -lc "
                set -euo pipefail
                dnf -y install copr-cli >/dev/null
                copr-cli build-package bonvaffel/cli-tools \
                  --name '${package}' \
                  --enable-net on \
                  --background \
                  --nowait
              "
          done
